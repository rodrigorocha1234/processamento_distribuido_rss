services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    command: [ "redis-server", "--save", "60", "1", "--loglevel", "warning", "--dir", "/data" ]
    volumes:
      - ./redis_data:/data
    environment:
      - TZ=America/Sao_Paulo

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    environment:
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - TZ=America/Sao_Paulo
    volumes:
      - ./redisinsight_data:/data
    user: "0:0"
    restart: unless-stopped
    depends_on:
      - redis

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
      - TZ=America/Sao_Paulo
    ports:
      - "8081:8081"
    depends_on:
      - redis
    volumes:
      - ./redis_commander_data:/home/app/.redis-commander
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: scripts_dockerfile/celery.Dockerfile
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    command: python tasks.py  # Apenas para rodar um script de teste

  worker:
    build:
      context: .
      dockerfile: scripts_dockerfile/celery.Dockerfile
    volumes:
      - .:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    # Comando para iniciar o worker do Celery
    command: celery -A tasks worker --loglevel=info

  flower:
    image: mher/flower:latest
    container_name: flower
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    restart: unless-stopped

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./vl_prometeus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    volumes:
      - ./grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

volumes:
  redis_data:
  redisinsight_data:
  redis_commander_data:
  prometheus_data:
  grafana_data:
